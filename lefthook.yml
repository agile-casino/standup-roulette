pre-commit:
  parallel: true
  jobs:
    - name: biome
      glob: "*.{js,ts,jsx,tsx,json,css}"
      run: pnpm biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true
    - name: prettier
      glob: "*.{md,yml}"
      run: pnpm prettier --write {staged_files}
      stage_fixed: true

pre-push:
  parallel: true
  commands:
    typecheck:
      run: pnpm typecheck
    knip:
      run: pnpm knip
    build:
      run: pnpm build
    test:
      run: pnpm test
