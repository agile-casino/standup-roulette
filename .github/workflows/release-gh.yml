name: Release (GitHub)

on:
  push:
    tags: ['v*.*.*']

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install Packages
        run: |
          npm i -g corepack@latest
          corepack enable
          pnpm install

      - name: Build Code
        run: |
          pnpm run build
          pnpm run test
          pnpm biome ci src

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/index.user.js
